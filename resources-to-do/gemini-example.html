<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        .app-container { font-family: 'Segoe UI', sans-serif; border: 2px solid #2c3e50; padding: 20px; border-radius: 10px; background: #f9f9f9; }
        .calc-section { margin-bottom: 20px; padding: 15px; border-left: 5px solid #3498db; background: white; }
        label { display: inline-block; width: 200px; font-weight: bold; }
        input { padding: 5px; margin: 5px; width: 80px; }
        .result { color: #e67e22; font-weight: bold; font-size: 1.1em; }
    </style>
</head>
<body>
    <div class="app-container">
        <h2>Simulador de Transferencia de Calor v1.0</h2>
        
        <div class="calc-section">
            <h3>1. Conducción (Ley de Fourier)</h3>
            <label>Conductividad (k):</label> <input type="number" id="k" value="0.5"> W/m·K<br>
            <label>Área (A):</label> <input type="number" id="A_cond" value="1"> m²<br>
            <label>ΔT (T1 - T2):</label> <input type="number" id="dT_cond" value="50"> K<br>
            <label>Espesor (L):</label> <input type="number" id="L" value="0.01"> m<br>
            <p class="result">Calor (Q): <span id="res_cond">--</span> Watts</p>
        </div>

        <div class="calc-section">
            <h3>2. Convección (Ley de Newton)</h3>
            <label>Coeficiente (h):</label> <input type="number" id="h" value="25"> W/m²·K<br>
            <label>Área (A):</label> <input type="number" id="A_conv" value="1"> m²<br>
            <label>T_sup - T_inf:</label> <input type="number" id="dT_conv" value="30"> K<br>
            <p class="result">Calor (Q): <span id="res_conv">--</span> Watts</p>
        </div>
    </div>
</body>
</html>
